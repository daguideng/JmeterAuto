spring:


  datasource:
#   数据源基本配置
    username: appium
    password: nopass.88888888
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://10.43.27.231:3306/jmeterboot?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    type: com.alibaba.druid.pool.DruidDataSource
    #   数据源其他配置
    initialSize: 5
    minIdle: 5
    maxActive: 20
    maxWait: 600008089
    timeBetweenEvictionRunsMillis: 60000
    minEvictableIdleTimeMillis: 300000
    validationQuery: SELECT 1 FROM DUAL
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
    poolPreparedStatements: true
#   配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
    filters: stat,wall,log4j
    maxPoolPreparedStatementPerConnectionSize: 20
    useGlobalDataSourceStat: true
    connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500

  activemq:
    user: admin
    password: admin
    broker-url: tcp://10.43.27.231:61616
#    broker-url: tcp://49.232.24.147:61616
    pool:
      enabled: true
      max-connections: 50


queueNamePerf: publish.perf.queue
topicNamePerf: publish.topic.testSpringboot.perf.Topic


mybatis:
  config-location: classpath:/mybatis-config.xml
  mapper-locations: classpath:/mapper/*.xml

#actuator
