<div style='margin-top: 2%;'>
    <div class="btn-group" role="group" aria-label="测试用例筛选" style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px;">
        <button type="button" id="check-all" class="btn btn-primary" style="background-color: #4285f4; border-color: #3367d6; padding: 8px 16px; font-size: 14px; border-radius: 6px; transition: all 0.3s ease;">所有用例</button>
        <button type="button" id="check-success" class="btn btn-success" style="background-color: #34a853; border-color: #2d9249; padding: 8px 16px; font-size: 14px; border-radius: 6px; transition: all 0.3s ease;">成功用例</button>
        <button type="button" id="check-danger" class="btn btn-danger" style="background-color: #ea4335; border-color: #d93025; padding: 8px 16px; font-size: 14px; border-radius: 6px; transition: all 0.3s ease;">失败用例</button>
        <button type="button" id="check-warning" class="btn btn-warning" style="background-color: #fbbc05; border-color: #f29900; padding: 8px 16px; font-size: 14px; border-radius: 6px; transition: all 0.3s ease;">警告用例</button>
        <button type="button" id="check-except" class="btn btn-default" style="background-color: #f8f9fa; border-color: #dadce0; padding: 8px 16px; font-size: 14px; border-radius: 6px; transition: all 0.3s ease;">异常用例</button>
    </div>
    
    <div class="table-container panel panel-default">
        <div class="panel-heading" style="background-color: #f8f9fa; padding: 15px 20px; border-bottom: 1px solid #e9ecef;">
            <h3 class="panel-title" style="margin-top: 0; margin-bottom: 0; font-size: 18px; color: #202124; font-weight: 500;">测试用例详细结果</h3>
        </div>
        
        <div class="table-responsive" style="max-height: 720px; overflow-y: auto;">
            <table class="table table-hover table-condensed table-bordered" style="word-wrap:break-word; word-break:break-all; margin-bottom: 0; border-collapse: collapse; width: 100%;">
                <thead style="background-color: #f1f3f4; position: sticky; top: 0; z-index: 10;">
                    <tr>
                        <th style="vertical-align: middle; text-align: center; padding: 12px; font-weight: 500; color: #202124; border-bottom: 2px solid #e9ecef;"><strong>id</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>开始时间</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>脚本名称</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>线程数</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>标签</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>样本数</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>失败数</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>错误率(%)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>最小响应时间(ms)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>最大响应时间(ms)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>中位数(ms)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>90%响应时间(ms)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>95%响应时间(ms)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>99%响应时间(ms)</strong></th>   
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>平均响应时间(ms)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>吞吐量(tps)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>接收速率(KB/sec)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>发送速率(KB/sec)</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>结果</strong></th>
                        <th style="vertical-align: middle; text-align: center; padding: 8px;"><strong>代理IP</strong></th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="case-tr {1}" style="transition: all 0.2s ease-in-out; border-bottom: 1px solid #e9ecef;">
                        {0}
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>



<style>.t-c{overflow:hidden;border-radius:8px;box-shadow:0 1px 12px #00000014}table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:#fff}th{background:#f9fafb;color:#4b5563;font-weight:600;padding:10px 12px;border-bottom:1px solid #e5e7eb;position:sticky;top:0}td{padding:8px 12px;border-bottom:1px solid #f3f4f6;transition:all .15s}tr:hover td{background:#f8fafc;transform:translateX(2px)}.btn{display:inline-block;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;background:#f3f4f6;color:#111827;transition:all .2s;border:0;cursor:pointer}.btn:hover{background:#e5e7eb;transform:translateY(-1px);box-shadow:0 2px 4px #0000000d}.st,.st-p,.st-f,.st-w,.st-e{display:inline-block;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500}.st-p{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}.st-f{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.st-w{background:#fffbeb;color:#d97706;border:1px solid #fde68a}.st-e{background:#f5f5f4;color:#78716c;border:1px solid #e7e5e4}@media (max-width:768px){.t-c,table{font-size:12px}.t-c{border-radius:0;box-shadow:none}th,td{padding:8px 10px}}</style>
